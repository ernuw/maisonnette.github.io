<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilités - Mon Gîte</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .calendar-wrapper {
            position: relative;
            padding-bottom: 75%; /* Ratio pour mobile */
            height: 0;
            overflow: hidden;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .calendar-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Description</a> | 
        <a href="dispo.html">Disponibilité & Réservation</a>
    </nav>

    <section>
        <h2>Calendrier des disponibilités</h2>
        <p>Consultez nos dates libres ci-dessous (mis à jour en temps réel) :</p>
        
        <div class="calendar-wrapper">
            <iframe src="https://calendar.google.com/calendar/embed?src=VOTRE_ID_CALENDRIER_GOOGLE&ctz=Europe%2FParis" 
                    style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>

        <div class="contact-box">
            <h3>Une question ? Réservez en direct</h3>
            <p>Téléphone : <strong>[Votre Numéro]</strong></p>
            <p>Email : <strong>[Votre Email]</strong></p>
            <p><small>En réservant ici, vous évitez les frais de plateforme !</small></p>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gîte La Maisonnette - Page de Test d'Identification</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #2980b9;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--light);
            margin: 0;
            color: var(--dark);
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 { margin-top: 0; color: var(--primary); }
        p { line-height: 1.5; color: #7f8c8d; margin-bottom: 25px; }
        .footer-link { margin-top: 20px; display: block; font-size: 0.9em; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Identification Test</h2>
        <p>Cette page permet de vérifier la récupération de votre identifiant Google (Email).</p>
        
        <div id="g_id_onload"
             data-client_id="225723532887-0g0cd8cvghb8v9uao90na92eq53rp873.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div style="display: flex; justify-content: center;">
            <div class="g_id_signin" 
                 data-type="standard" 
                 data-shape="pill" 
                 data-theme="outline" 
                 data-text="signin_with" 
                 data-size="large" 
                 data-logo_alignment="left">
            </div>
        </div>

        <a href="index.html" class="footer-link">← Retour au site</a>
    </div>

    <script>
        /**
         * Fonction pour décoder le jeton JWT (JSON Web Token) renvoyé par Google
         */
        function parseJwt(token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        };

        /**
         * Callback exécuté après que l'utilisateur a choisi son compte Google
         */
        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            
            if (responsePayload && responsePayload.email) {
                const email = responsePayload.email;
                // Affichage du résultat dans une boîte de dialogue
                alert("Succès !\nID Google récupéré : " + email);
            } else {
                alert("Erreur lors de la récupération des informations.");
            }
        }
    </script>

</body>
</html>
